name: pipeline

on:
  schedule:
    # Cadence 2 h. Le cron GitHub est best-effort (~25 % de créneaux sautés) :
    # un 2e horaire 30 min après chaque créneau sert de rattrapage dans la même
    # fenêtre. Si les deux passent, le 2e est quasi gratuit (since_id -> 0 lecture)
    - cron: "0 */2 * * *"
    - cron: "30 */2 * * *"
  workflow_dispatch:

# Jamais deux pipelines en même temps (un run lent + le cron suivant)
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --no-dev
      - name: Ingestion + scoring + alertes
        run: uv run python -m scripts.run_pipeline
        env:
          PYTHONUNBUFFERED: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
