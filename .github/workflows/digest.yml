name: digest

on:
  schedule:
    # Cron GitHub = UTC : 06:30 UTC = 8h30 Paris l'été, 7h30 l'hiver
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --no-dev
      - name: Construction + envoi du digest
        run: uv run python -m scripts.send_digest
        env:
          PYTHONUNBUFFERED: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
